name: Release Checks

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  release-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run release checks
        shell: pwsh
        run: ./scripts/release-check.ps1
