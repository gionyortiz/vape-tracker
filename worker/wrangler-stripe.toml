name = "nexaquantum-stripe-webhook"
main = "stripe-webhook.js"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]

[[kv_namespaces]]
binding = "LICENSES"
id = "PLACEHOLDER_REPLACE_BY_SCRIPT"

# Secrets (set via wrangler secret put, NOT stored here):
#   STRIPE_SECRET_KEY      — your Stripe live secret key  sk_live_...
#   STRIPE_WEBHOOK_SECRET  — from Stripe → Webhooks → Signing secret  whsec_...
